name: Docs CI

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/**'
      - 'transform/models/**'
      - 'transform/macros/**'
      - 'ingestion/**'
      - 'ml/**'
      - 'README.md'
      - '.github/workflows/docs-ci.yml'

jobs:
  build:
    name: Docusaurus build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: cd docs && npm ci

      - name: Build site
        run: cd docs && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: docusaurus-build
          path: docs/build/
          retention-days: 1

  links:
    name: Link check (internal)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docusaurus-build
          path: docs/build/

      - name: Install lychee
        run: |
          curl -sL \
            https://github.com/lycheeverse/lychee/releases/download/lychee-v0.15.1/lychee-x86_64-unknown-linux-musl.tar.gz \
            | tar xz
          sudo mv lychee /usr/local/bin/

      - name: Check internal links
        run: |
          lychee \
            --offline \
            --no-progress \
            --exclude 'mailto:' \
            --exclude-path 'docs/build/assets' \
            'docs/build/**/*.html'

  style:
    name: Vale style lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: errata-ai/vale-action@reviewdog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: docs/docs/
          reporter: github-pr-review
          fail_on_error: true

  spellcheck:
    name: Spell check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: streetsidesoftware/cspell-action@v6
        with:
          files: 'docs/docs/**/*.{md,mdx}'
          config: docs/.cspell.json
          strict: true
          incremental_files_only: false

  snippets:
    name: Snippet tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install snippet test dependencies
        run: pip install sybil pytest

      - name: Run snippet tests
        run: |
          pytest \
            docs/docs/tutorials/first-build.md \
            docs/docs/guides/add-a-season.md \
            -v --tb=short

  docs-audit:
    name: Docs audit (README presence + tour footers + file headers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run docs audit
        run: python scripts/docs_audit.py --headers

  docs-facts:
    name: Headline-count reconciliation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Check fact consistency
        run: python scripts/docs_facts.py

  reference-drift:
    name: Reference drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dbt and generators
        run: pip install dbt-core==1.11.9 dbt-duckdb==1.10.1

      - name: Install dbt packages
        working-directory: transform
        run: dbt deps --profiles-dir profiles --target ci

      - name: Parse dbt project
        working-directory: transform
        run: dbt parse --profiles-dir profiles --target ci

      - name: Regenerate reference docs
        run: python scripts/build_reference.py

      - name: Fail if reference docs drifted
        run: |
          if ! git diff --exit-code docs/docs/reference/; then
            echo ""
            echo "Reference docs are out of date."
            echo "Run 'python scripts/build_reference.py' locally and commit the changes."
            exit 1
          fi
