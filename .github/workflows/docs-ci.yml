name: Docs CI

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/**'
      - 'transform/models/**'
      - 'transform/macros/**'
      - 'ingestion/**'
      - 'ml/**'
      - 'README.md'
      - '.github/workflows/docs-ci.yml'

jobs:
  validate:
    name: Mintlify validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Mintlify configuration
        run: |
          cd docs
          npx -y mintlify@latest validate

      - name: Check broken links
        run: |
          cd docs
          npx -y mintlify@latest broken-links

  docs-audit:
    name: Docs audit (README presence + tour footers + file headers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run docs audit
        run: python scripts/docs_audit.py --headers

  docs-facts:
    name: Headline-count reconciliation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Check fact consistency
        run: python scripts/docs_facts.py

  reference-drift:
    name: Reference drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dbt and generators
        run: pip install dbt-core==1.11.9 dbt-duckdb==1.10.1

      - name: Install dbt packages
        working-directory: transform
        run: dbt deps --profiles-dir profiles --target ci

      - name: Parse dbt project
        working-directory: transform
        run: dbt parse --profiles-dir profiles --target ci

      - name: Regenerate reference docs
        run: python scripts/build_reference.py

      - name: Fail if reference docs drifted
        run: |
          if ! git diff --exit-code docs/reference/; then
            echo ""
            echo "Reference docs are out of date."
            echo "Run 'python scripts/build_reference.py' locally and commit the changes."
            exit 1
          fi
