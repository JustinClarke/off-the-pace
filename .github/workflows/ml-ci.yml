name: ML CI

# Machine layer. Mirrors dbt-ci.yml's fixture-gated pattern: data/ is gitignored, so the
# warehouse is rebuilt from committed bronze fixtures (transform/tests/fixtures/bronze/). Steps that
# need a populated mart gate on the fixtures being present; the static guards (hardcoded-holdout grep,
# model-card drift) always run. Builds nothing into app/ and never commits.

on:
  pull_request:
    branches: [main]
    paths:
      - 'ml/**'
      - 'scripts/gen_ml_reference.py'
      - 'scripts/build_reference.py'
      - '.github/workflows/ml-ci.yml'

jobs:
  # ── Leakage guards: the spine. Static guards run unconditionally; warehouse-dependent
  #    guards run once the mart is built from fixtures. Any failure is red. ──────────────
  ml-leakage-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt
          pip install dbt-core==1.11.9 dbt-duckdb==1.10.1

      # Static guards - no warehouse, no fixtures needed.
      - name: Guard - no hardcoded holdout year
        run: python -m pytest ml/tests/test_features.py::test_no_hardcoded_holdout -q

      - name: Guard - model-card / MDX drift (D2)
        run: python scripts/gen_ml_reference.py --check

      - name: Check fixture data exists
        id: fixtures
        run: |
          if [ -d "transform/tests/fixtures/bronze/laps" ]; then
            echo "present=true" >> $GITHUB_OUTPUT
          else
            echo "present=false" >> $GITHUB_OUTPUT
            echo "::warning::Bronze fixtures absent - warehouse-dependent leakage guards skipped. Commit transform/tests/fixtures/bronze/ to enable."
          fi

      - name: Build the cliff mart from fixtures
        if: steps.fixtures.outputs.present == 'true'
        working-directory: ./transform
        run: |
          dbt deps --profiles-dir profiles --target ci
          dbt seed --profiles-dir profiles --target ci
          dbt build --profiles-dir profiles --target ci \
            --select fct_cliff_prediction_features+ \
            --vars '{"bronze_base": "../transform/tests/fixtures/bronze"}'

      # Warehouse + manifest present (compiled_code makes the forward-window audit meaningful).
      - name: Guard - leakage columns + forward-window audit + holdout purity
        if: steps.fixtures.outputs.present == 'true'
        run: |
          python -m pytest -q \
            ml/tests/test_features.py::test_no_leaked_columns \
            ml/tests/test_features.py::test_no_forward_looking_features \
            ml/tests/test_features.py::test_audit_features_clear_forward_window \
            ml/tests/test_features.py::test_holdout_purity \
            ml/tests/test_features.py::test_target_bounded \
            ml/tests/test_features.py::test_no_null_targets_in_training

      # Skips cleanly when ml/artefacts/evaluation_metrics.json is absent (regen-able, gitignored).
      - name: Guard - every model beats its baseline (if eval artefact present)
        if: steps.fixtures.outputs.present == 'true'
        run: python -m pytest ml/tests/test_evaluate.py::test_model_beats_baseline_overall -q

  # ── Smoke: end-to-end on tiny boosters → ONNX parity (the D1/R9 contract). ────────────
  ml-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt
          pip install dbt-core==1.11.9 dbt-duckdb==1.10.1

      - name: Check fixture data exists
        id: fixtures
        run: |
          if [ -d "transform/tests/fixtures/bronze/laps" ]; then
            echo "present=true" >> $GITHUB_OUTPUT
          else
            echo "present=false" >> $GITHUB_OUTPUT
            echo "::warning::Bronze fixtures absent - ML smoke path skipped (needs a multi-season mart for the season-grouped CV)."
          fi

      - name: Build the cliff mart from fixtures
        if: steps.fixtures.outputs.present == 'true'
        working-directory: ./transform
        run: |
          dbt deps --profiles-dir profiles --target ci
          dbt seed --profiles-dir profiles --target ci
          dbt build --profiles-dir profiles --target ci \
            --select fct_cliff_prediction_features+ \
            --vars '{"bronze_base": "../transform/tests/fixtures/bronze"}'

      - name: Features audit (--check)
        if: steps.fixtures.outputs.present == 'true'
        run: python -m ml.src.features --check

      - name: Tiny smoke train → predict → ONNX → parity
        if: steps.fixtures.outputs.present == 'true'
        run: |
          python -m ml.src.train --all --smoke --n-estimators 10 --max-depth 3
          python -m ml.src.predict --version smoke --out data/marts/mart_degradation_predictions.parquet
          python -m ml.src.export_onnx --all --version smoke
          python -m pytest ml/tests/test_onnx_parity.py ml/tests/test_predict.py -q

      - name: Model-card / MDX drift (D2)
        run: python scripts/gen_ml_reference.py --check
