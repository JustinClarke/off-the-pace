model_card:
  name: Off the Pace-Tyre Degradation Predictors
  version: v1
  generated_at: '2026-06-12T08:44:39.770135+00:00'
  summary: Five XGBoost models predicting next-lap tyre-degradation pace loss (quantile trio p10/p50/p90),
    laps-until-cliff class, and remaining stint life, from per-lap thermal, dirty-air, powertrain, weather
    and compound-prior features. Trained on 2018–2024 F1 laps; every model beats a strong per-cohort baseline.
  intended_use: 'Race-strategy analysis and the Off the Pace web app (application layer): surfacing when
    a stint is about to fall off the degradation cliff and how much pace a driver is leaving on track.
    Not a betting or safety system.'
  data:
    source_mart: fct_cliff_prediction_features
    training_seasons:
    - 2018
    - 2019
    - 2020
    - 2021
    - 2022
    - 2023
    - 2024
    holdout_seasons:
    - 2025
    holdout_note: 2025 is the designated holdout, ingested post-launch; until then the model trains on
      all ingested seasons (2018–2024) and selection rests on time-series CV-there is no live holdout.
      The evaluation headline is reported on the final TimeSeriesSplit fold (2024); it switches to a true-holdout
      reveal the moment 2025 ingests, with no code change.
    n_training_rows: 110440
    feature_count: 38
    evaluation_mode: cv_final_fold
    evaluation_season: 2024
  features:
    columns:
    - lap_number
    - lap_in_stint
    - age_in_stint
    - fuel_mass_kg
    - compound
    - compound_grip_peak
    - compound_wear_gradient
    - compound_optimal_temp_low
    - compound_optimal_temp_high
    - compound_cliff_onset_laps
    - compound_cliff_severity
    - expected_compound_pace_s
    - expected_degradation_rate_s_per_lap
    - cliff_onset_passed
    - laps_past_cliff
    - cliff_candidate_flag
    - push_residual
    - cumulative_push_load_surface
    - cumulative_push_load_bulk
    - dirty_air_share_lap
    - dirty_air_thermal_load_surface
    - dirty_air_thermal_load_bulk
    - air_state_dominant
    - n_gear_changes
    - mean_rpm
    - max_rpm
    - pct_full_throttle
    - pct_drs_active
    - short_shift_index
    - ambient_temp_delta
    - air_density_kgm3
    - density_ratio_to_ref
    - is_rain_lap
    - track_energy_index
    - circuit_abrasiveness_index
    - constructor_id
    - event_flag_any
    - anomaly_class
    groups:
      stint_position:
      - lap_number
      - lap_in_stint
      - age_in_stint
      - fuel_mass_kg
      compound:
      - compound
      - compound_grip_peak
      - compound_wear_gradient
      - compound_optimal_temp_low
      - compound_optimal_temp_high
      - compound_cliff_onset_laps
      - compound_cliff_severity
      cliff_prior:
      - expected_compound_pace_s
      - expected_degradation_rate_s_per_lap
      - cliff_onset_passed
      - laps_past_cliff
      - cliff_candidate_flag
      thermal:
      - push_residual
      - cumulative_push_load_surface
      - cumulative_push_load_bulk
      dirty_air:
      - dirty_air_share_lap
      - dirty_air_thermal_load_surface
      - dirty_air_thermal_load_bulk
      - air_state_dominant
      powertrain:
      - n_gear_changes
      - mean_rpm
      - max_rpm
      - pct_full_throttle
      - pct_drs_active
      - short_shift_index
      weather_air:
      - ambient_temp_delta
      - air_density_kgm3
      - density_ratio_to_ref
      - is_rain_lap
      track:
      - track_energy_index
      - circuit_abrasiveness_index
      context:
      - constructor_id
      - event_flag_any
      - anomaly_class
    categorical:
      compound: 8
      air_state_dominant: 4
      constructor_id: 18
      anomaly_class: 3
    excluded_leakage:
    - circuit_key
    - driver_id
    - driver_skill_proxy_s
    - driver_skill_residual_proxy_s
    - driver_skill_residual_s
    - is_training_eligible
    - lap_id
    - laps_until_cliff_class
    - next_3_lap_cumulative_jump_s
    - next_5_lap_cumulative_jump_s
    - next_lap_degradation_jump_s
    - race_id
    - race_year
    - remaining_stint_life_laps
    - stint_id
    - stint_length_laps
    excluded_note: 'driver_id and race_year are deliberately excluded: an adversarial probe recovers race_year
      from the remaining features at 1.000 accuracy (majority baseline 0.169)-constructor identity and
      compound generation encode the season, so race_year would be a backdoor. driver_id would let the
      trees relearn per-driver skill, the exact signal the mart strips via driver_skill_residual_s.'
  models:
