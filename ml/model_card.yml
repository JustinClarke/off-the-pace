        - cumulative_push_load_surface
        - cumulative_push_load_bulk
        - pct_drs_active
        - age_in_stint
        agreement_note: 'top-5 differ on: dirty_air_thermal_load_bulk, pct_drs_active likely correlated
          features or leakage pressure'
      cliff_classifier:
        shap_top5:
        - fuel_mass_kg
        - lap_number
        - age_in_stint
        - lap_in_stint
        permutation_top5:
        - push_residual
        - fuel_mass_kg
        - age_in_stint
        - cumulative_push_load_bulk
        - ambient_temp_delta
        agreement_note: 'top-5 differ on: ambient_temp_delta, cumulative_push_load_bulk, lap_in_stint,
          lap_number, push_residual likely correlated features or leakage pressure'
      stint_life_regressor:
        shap_top5:
        - fuel_mass_kg
        - age_in_stint
        - cumulative_push_load_bulk
        - lap_number
        - compound
        permutation_top5:
        - fuel_mass_kg
        - age_in_stint
        - compound
        - lap_number
        - cumulative_push_load_bulk
        agreement_note: SHAP and permutation top-5 agree
