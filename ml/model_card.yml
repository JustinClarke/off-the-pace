  validation:
    scheme: season-grouped TimeSeriesSplit (expanding window, n_splits=5); whole seasons move together,
      the final fold validates on 2024
    headline_metric_direction: pinball ↓ (quantiles), macro-F1 ↑ (classifier), RMSE ↓ (stint-life)
    all_models_beat_baseline: true
    baselines:
      degradation_p50: group-mean over (compound, circuit, age-bucket) cells, compound→global fallback
      degradation_p10_p90: empirical 10th/90th percentile in the same cells
      cliff_classifier: majority-class prior (none_in_stint)
      stint_life: (stint_length_laps − lap_in_stint)/2-knowingly leakage-shaped strong anchor
    calibration:
      nominal: 0.8
      raw_empirical_coverage: 0.8033410076564759
      conformal_empirical_coverage: 0.8045829317914124
      conformal_q: -0.0008061921119519866
      mean_interval_width: 1.1057158708572388
      n: 18677
    leakage_probe:
      accuracy: 0.9999637812386817
      majority_class_accuracy: 0.1691174695158759
      lift_over_chance: 0.8308463117228058
      n_seasons: 7
      note: X carries strong residual temporal signal race_year recoverable far above chance; race_year
        is correctly excluded from features
    dual_importance:
      degradation_regressor_p50:
        shap_top5:
        - push_residual
        - cumulative_push_load_surface
        - age_in_stint
        - cumulative_push_load_bulk
        - dirty_air_thermal_load_bulk
        permutation_top5:
