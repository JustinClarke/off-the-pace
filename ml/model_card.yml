  reproducibility:
    random_state: 20260528
    dataset_fingerprint: 3aff45592c335b9781de5a5627e33068bfd03677b2e8aebc78ec3480ba162e7d
    library_versions:
      xgboost: 3.2.0
      sklearn: 1.8.0
    command: make ml-all
    onnx_parity: all 5 boosters round-trip to ONNX within atol=1e-5 on a NaN-bearing sample (M2/M4)
  deviations:
  - id: D1
    note: Built on XGBoost 3.2.0 (contract said 2.x); ONNX quantile round-trip spiked in M2 before tuning.
  - id: D5
    note: Degradation target is bounded [−10,10] with 44% legitimate negatives (thermal gain / out-lap
      recovery); the contract's y>0 test was a spec bug.
  - id: E1
    note: Evaluation uses the final CV fold (2024) as a holdout stand-in; 2025 not yet ingested.
  - id: E3
    note: Heavy elevations (ablation/learning-curve/SHAP/PDP) run on the headline model of each family;
      quantile siblings share p50's structure.
  limitations:
  - The cliff classifier (macro-F1 ≈ 0.36 on 4-class cliff timing) is the weakest model-it decisively
    beats the majority prior but absolute skill on minority cliff windows is modest.
  - v1 hyperparameters come from a reduced session tuning budget; a canonical 50-trial / 5-fold search
    should precede a production blessing.
  - No live 2025 holdout yet-headline numbers are time-series CV until 2025 ingests.
  - Cliff-onset priors are NULL for ~45% of laps (legacy compounds, un-fit circuits); XGBoost native-NaN
    carries them, documented rather than imputed.
