version: 2

models:
 -name: stg_laps
    description: >
      Cleaned lap-level data from FastF1. One row per driver × lap.
      Includes sector times, speed traps, pit flags, and validity classification.
      is_valid_lap = TRUE excludes pit laps, deleted laps, SC/VSC laps, and lap 1.
    columns:
     -name: lap_id
        description: Surrogate key   season_raceid_driverid_lapnumber
        tests: [not_null, unique]
     -name: driver_id
        tests: [not_null]
     -name: race_year
        tests: [not_null]
     -name: race_id
        tests: [not_null]
     -name: lap_number
        tests: [not_null]
     -name: compound
        description: >
          Tyre compound label. NULL for rows where FastF1 returned None/nan/UNKNOWN.
          Pre-2019 compounds (SUPERSOFT/ULTRASOFT/HYPERSOFT) preserved as-is.
        tests:
         -accepted_values:
              arguments:
                values: ['SOFT', 'MEDIUM', 'HARD', 'INTERMEDIATE', 'WET',
                         'SUPERSOFT', 'ULTRASOFT', 'HYPERSOFT']
              config:
                where: "compound IS NOT NULL"

 -name: stg_sector_times
    description: >
      Per-sector timing unpivoted from stg_laps. One row per lap × sector (1/2/3).
      Carries the speed trap reading associated with each sector exit.
    columns:
     -name: sector_id
        description: Surrogate key   lap_id_S{sector}
        tests: [not_null, unique]
     -name: lap_id
        tests: [not_null]
     -name: sector
        tests:
         -accepted_values:
              arguments:
                values: [1, 2, 3]

 -name: stg_pits
    description: >
      One row per pit stop event, derived from laps with non-null PitInTime or PitOutTime.
      pit_duration_s is null when only one of in/out time is recorded.
    columns:
     -name: lap_id
        tests: [not_null]

 -name: stg_weather
    description: >
      Weather snapshot per lap, joined from bronze weather samples (≈1Hz) using
      nearest-predecessor match on session_time_s. One row per driver × lap.
      Covers all 168 races 2018–2024; zero nulls in source data.

 -name: stg_events
    description: >
      Race-level events (damage, retirements, penalties) sourced from raw_dim_events seed.
      Currently manual entries for 2021 only. Expand as automated detection is built.
    columns:
     -name: stg_event_id
        tests: [not_null, unique]

 -name: stg_tyre_allocations
    description: >
      STUB   source not yet ingested. Returns an empty result set with the correct schema
      so downstream models (dim_compounds_season) can reference it without build errors.
      FastF1 already exposes HARD/MEDIUM/SOFT labels directly in the Compound column,
      so this model is low priority for 2018+ seasons. Activate when Pirelli allocation
      sheets are scraped to map compound codes (C1–C5) to hard/medium/soft per circuit.
